<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Sniper HUD 究極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .progress-ring__circle { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .lightbox-anim { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 font-sans selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;
        const USD_TO_HKD = 7.8;

        const DEFAULT_TAGS = [
            { id: 'flawless', label: 'Flawless (完美)', color: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' },
            { id: 'fomo', label: 'FOMO (錯失恐懼)', color: 'bg-red-500/20 text-red-400 border-red-500/30' },
            { id: 'early_exit', label: 'Early Exit (早走)', color: 'bg-orange-500/20 text-orange-400 border-orange-500/30' },
            { id: 'moved_sl', label: 'Moved SL (移止損)', color: 'bg-red-500/20 text-red-400 border-red-500/30' },
            { id: 'scale_out', label: 'Scale Out (分批平倉)', color: 'bg-blue-500/20 text-blue-400 border-blue-500/30' } 
        ];
        const TAG_COLORS = [
            'bg-blue-500/20 text-blue-400 border-blue-500/30', 
            'bg-purple-500/20 text-purple-400 border-purple-500/30', 
            'bg-pink-500/20 text-pink-400 border-pink-500/30', 
            'bg-cyan-500/20 text-cyan-400 border-cyan-500/30', 
            'bg-yellow-500/20 text-yellow-400 border-yellow-500/30'
        ];

        const getLocalYMD = (offsetDays = 0) => {
            const d = new Date(); 
            d.setDate(d.getDate() + offsetDays); 
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };

        const ProgressRing = ({ radius, stroke, progress, target, current }) => {
            const normalizedRadius = radius - stroke * 2;
            const circumference = normalizedRadius * 2 * Math.PI;
            const strokeDashoffset = circumference - (Math.min(Math.max((progress / 100), 0), 1)) * circumference;
            const colorClass = progress >= 100 ? 'text-emerald-500' : progress > 50 ? 'text-blue-500' : 'text-slate-500';
            return (
                <div className="relative flex flex-col items-center justify-center">
                    <svg height={radius * 2} width={radius * 2}>
                        <circle stroke="#1e293b" fill="transparent" strokeWidth={stroke} r={normalizedRadius} cx={radius} cy={radius} />
                        <circle className={`progress-ring__circle ${colorClass}`} stroke="currentColor" fill="transparent" strokeWidth={stroke} strokeDasharray={circumference + ' ' + circumference} style={{ strokeDashoffset }} strokeLinecap="round" r={normalizedRadius} cx={radius} cy={radius} />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center text-center">
                        <span className="text-3xl font-black text-white">{current > 0 ? '+' : ''}{current}</span>
                        <span className="text-[10px] font-bold text-slate-400">/ {target} R</span>
                    </div>
                </div>
            );
        };

        const EquityChart = ({ trades }) => {
            const [tooltip, setTooltip] = useState(null);
            if (!trades || trades.length === 0) return <div className="h-full flex items-center justify-center text-slate-600 font-mono text-xs">No Data</div>;

            const data = [...trades].sort((a,b) => a.id - b.id);
            let currentR = 0; 
            const points = [{ r: 0, trade: null }];
            data.forEach(t => { currentR += t.rMultiple; points.push({ r: currentR, trade: t }); });

            const maxR = Math.max(...points.map(p => p.r), 2); 
            const minR = Math.min(...points.map(p => p.r), -2);
            const range = maxR - minR || 1; 
            const width = 600, height = 150, padding = 20;

            const getY = (r) => height - padding - ((r - minR) / range) * (height - 2 * padding);
            const getX = (index) => padding + (index / Math.max(points.length - 1, 1)) * (width - 2 * padding);
            const pathD = `M ${points.map((p, i) => `${getX(i)},${getY(p.r)}`).join(' L ')}`;
            const areaD = `${pathD} L ${getX(points.length-1)},${getY(0)} L ${getX(0)},${getY(0)} Z`;
            const isPositive = points[points.length-1].r >= 0;
            const strokeColor = isPositive ? '#10b981' : '#f43f5e';
            const fillUrl = isPositive ? 'url(#greenGradient)' : 'url(#redGradient)';

            return (
                <div className="w-full h-full flex flex-col relative" onMouseLeave={() => setTooltip(null)}>
                    <div className="flex-1 relative">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full drop-shadow-lg overflow-visible">
                            <defs>
                                <linearGradient id="greenGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" stopOpacity="0.4"/><stop offset="100%" stopColor="#10b981" stopOpacity="0"/></linearGradient>
                                <linearGradient id="redGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f43f5e" stopOpacity="0.4"/><stop offset="100%" stopColor="#f43f5e" stopOpacity="0"/></linearGradient>
                            </defs>
                            <line x1="0" y1={getY(0)} x2={width} y2={getY(0)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                            <path d={areaD} fill={fillUrl} />
                            <path d={pathD} fill="none" stroke={strokeColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
                            {points.map((p, i) => {
                                const x = getX(i), y = getY(p.r), isHovered = tooltip?.index === i;
                                return (
                                    <g key={i} onMouseEnter={() => setTooltip({ x, y, r: p.r, trade: p.trade, index: i })} className="cursor-crosshair outline-none">
                                        <circle cx={x} cy={y} r="15" fill="transparent" />
                                        <circle cx={x} cy={y} r={isHovered ? "5" : "3"} fill="#0f172a" stroke={strokeColor} strokeWidth={isHovered ? "2.5" : "1.5"} className="transition-all duration-200" />
                                    </g>
                                );
                            })}
                        </svg>
                        {tooltip && (
                            <div className="absolute z-20 bg-slate-800 border border-slate-600 rounded-lg shadow-xl pointer-events-none transform -translate-x-1/2 -translate-y-full flex flex-col justify-center min-w-[100px]" style={{ left: `${(tooltip.x / width) * 100}%`, top: `calc(${(tooltip.y / height) * 100}% - 12px)`, padding: '8px 12px' }}>
                                <div className={`font-black text-sm text-center border-b border-slate-700/50 pb-1 mb-1 ${tooltip.r >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{tooltip.r > 0 ? '+' : ''}{tooltip.r.toFixed(2)} R</div>
                                {tooltip.trade ? (
                                    <div className="text-[10px] flex flex-col gap-1 whitespace-nowrap">
                                        <div className="text-slate-300 font-bold">{tooltip.trade.asset} <span className="text-slate-500 font-normal">| {tooltip.trade.date.substring(5)}</span></div>
                                        <div className="flex justify-between items-center text-slate-400 gap-3"><span>該筆:</span><span className={`font-mono font-bold ${tooltip.trade.rMultiple >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>{tooltip.trade.rMultiple > 0 ? '+' : ''}{tooltip.trade.rMultiple}R</span></div>
                                    </div>
                                ) : <div className="text-[10px] text-slate-400 text-center font-bold">Start</div>}
                                <div className="absolute -bottom-1.5 left-1/2 transform -translate-x-1/2 w-3 h-3 bg-slate-800 border-b border-r border-slate-600 rotate-45"></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const TradingHeatmap = ({ trades }) => {
            const days = 60; 
            const heatmapData = useMemo(() => {
                const map = {}; 
                const today = new Date();
                for(let i = days-1; i >= 0; i--) {
                    const d = new Date(today); 
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    map[dateStr] = { r: 0, count: 0 };
                }
                trades.forEach(t => { 
                    if(map[t.date]) { 
                        map[t.date].r += t.rMultiple; 
                        map[t.date].count++; 
                    } 
                });
                return Object.entries(map).map(([date, data]) => ({ date, ...data }));
            }, [trades]);

            return (
                <div className="flex flex-wrap gap-1 mt-2 justify-end">
                    {heatmapData.map((day, i) => {
                        let color = 'bg-slate-800 border-slate-700'; 
                        if (day.r >= 2) color = 'bg-emerald-500 border-emerald-600 shadow-[0_0_5px_rgba(16,185,129,0.5)]';
                        else if (day.r > 0) color = 'bg-emerald-800 border-emerald-700';
                        else if (day.r < 0) color = 'bg-red-800 border-red-900';
                        
                        return (
                            <div key={i} className={`w-3 h-3 sm:w-4 sm:h-4 rounded-[2px] border ${color} relative group cursor-pointer transition-transform hover:scale-125 z-10`}>
                                <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 hidden group-hover:block bg-slate-800 text-white text-[9px] px-2 py-1 rounded whitespace-nowrap z-50 border border-slate-600 shadow-xl pointer-events-none">
                                    {day.date.substring(5)}: {day.count === 0 ? 'Rest' : `${day.r > 0 ? '+' : ''}${day.r.toFixed(1)} R`}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        function App() {
            // == 狀態宣告區 ==
            const [availableTags, setAvailableTags] = useState(() => {
                try { 
                    const saved = localStorage.getItem('ict_available_tags'); 
                    if(saved) {
                        const parsed = JSON.parse(saved);
                        const missingDefaults = DEFAULT_TAGS.filter(dt => !parsed.some(pt => pt.id === dt.id));
                        return [...parsed, ...missingDefaults];
                    }
                    return DEFAULT_TAGS; 
                } catch { return DEFAULT_TAGS; }
            });
            
            const [isManagingTags, setIsManagingTags] = useState(false);
            const [newTagInput, setNewTagInput] = useState('');

            const initialTrades = [
                { id: 1, date: getLocalYMD(0), asset: 'NQ', timeframe: '5m', direction: 'Long', setup: 'FVG', killzone: 'NY AM', riskAmount: 500, pnl: 1500, rMultiple: 3, checklistScore: 4, notes: '完美的紐約開盤流動性獲取', screenshotUrls: [''], tags: ['flawless'] },
                { id: 2, date: getLocalYMD(-1), asset: 'ES', timeframe: '1m', direction: 'Short', setup: 'Order Block', killzone: 'London', riskAmount: 500, pnl: -500, rMultiple: -1, checklistScore: 2, notes: '被止損，提早進場', screenshotUrls: [''], tags: ['fomo', 'early_exit'] },
            ];

            const [trades, setTrades] = useState(() => {
                try { 
                    const saved = localStorage.getItem('ict_trades'); 
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) return parsed.map(t => ({ ...t, screenshotUrls: t.screenshotUrls || (t.screenshotUrl ? [t.screenshotUrl] : []) }));
                    }
                } catch {}
                return initialTrades;
            });

            const [timeFilter, setTimeFilter] = useState('month'); 
            const [advFilter, setAdvFilter] = useState({ type: 'All', setup: 'All' });
            
            const fileInputRef = useRef(null);
            const formRef = useRef(null);
            
            const [editingTradeId, setEditingTradeId] = useState(null);
            const [lightbox, setLightbox] = useState({ isOpen: false, urls: [], currentIndex: 0 });
            const [mcResult, setMcResult] = useState(null);
            const [showKillzoneInfo, setShowKillzoneInfo] = useState(false); // 已修復：補回缺失的狀態

            const [formData, setFormData] = useState({ date: getLocalYMD(0), asset: 'NQ', timeframe: '5m', direction: 'Long', setup: 'FVG', killzone: 'NY AM', riskAmount: '', pnl: '', screenshotUrls: [''], notes: '', tags: [] });
            const [checklist, setChecklist] = useState({ liquidity: false, killzone: false, displacement: false, htf: false });
            const [calc, setCalc] = useState({ account: 100000, riskPct: 0.5, entry: '', sl: '' });

            // == 副作用區 ==
            useEffect(() => { localStorage.setItem('ict_available_tags', JSON.stringify(availableTags)); }, [availableTags]);
            useEffect(() => { localStorage.setItem('ict_trades', JSON.stringify(trades)); }, [trades]);

            // == 邏輯運算區 ==
            const filteredTrades = useMemo(() => {
                const now = new Date();
                const startOfWeek = new Date(now); 
                startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1)); 
                startOfWeek.setHours(0,0,0,0);
                
                return trades.filter(t => {
                    let passTime = true;
                    const d = new Date(t.date);
                    if (timeFilter === 'year') passTime = d.getFullYear() === now.getFullYear();
                    if (timeFilter === 'month') passTime = d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    if (timeFilter === 'week') passTime = d >= startOfWeek;
                    if (!passTime && timeFilter !== 'all') return false;

                    if (advFilter.type === 'Wins' && t.rMultiple <= 0) return false;
                    if (advFilter.type === 'Losses' && t.rMultiple > 0) return false;
                    if (advFilter.setup !== 'All' && t.setup !== advFilter.setup) return false;

                    return true;
                });
            }, [trades, timeFilter, advFilter]);

            const dashboardStats = useMemo(() => {
                const tr = filteredTrades;
                const totalTrades = tr.length;
                const wins = tr.filter(t => t.rMultiple > 0);
                const losses = tr.filter(t => t.rMultiple <= 0);
                
                const winRateNum = totalTrades > 0 ? (wins.length / totalTrades) : 0;
                const winRate = (winRateNum * 100).toFixed(1);
                const totalR = tr.reduce((sum, t) => sum + t.rMultiple, 0);
                const totalPnL = tr.reduce((sum, t) => sum + t.pnl, 0);

                const avgWin = wins.length ? wins.reduce((s, t) => s + t.rMultiple, 0) / wins.length : 0;
                const avgLoss = losses.length ? losses.reduce((s, t) => s + Math.abs(t.rMultiple), 0) / losses.length : 0; 
                const expectancy = (winRateNum * avgWin) - ((1 - winRateNum) * avgLoss);

                let peak = 0, maxDD = 0, currentR_track = 0;
                [...tr].sort((a,b) => a.id - b.id).forEach(t => {
                    currentR_track += t.rMultiple;
                    if(currentR_track > peak) peak = currentR_track;
                    const dd = peak - currentR_track;
                    if(dd > maxDD) maxDD = dd;
                });

                const dayStats = [0,0,0,0,0,0,0].map(() => ({ count: 0, r: 0 })); 
                const sessionStats = { 'Asia': {r:0, count:0}, 'London': {r:0, count:0}, 'NY AM': {r:0, count:0}, 'NY PM': {r:0, count:0} };
                
                tr.forEach(t => {
                    const dayIdx = new Date(t.date).getDay();
                    dayStats[dayIdx].count++; dayStats[dayIdx].r += t.rMultiple;
                    if(sessionStats[t.killzone]) { sessionStats[t.killzone].count++; sessionStats[t.killzone].r += t.rMultiple; }
                });

                const mistakeCost = {};
                tr.forEach(t => {
                    if(t.tags && t.tags.length > 0 && t.rMultiple < 0) {
                        t.tags.forEach(tagId => {
                            if(tagId !== 'flawless' && tagId !== 'scale_out') mistakeCost[tagId] = (mistakeCost[tagId] || 0) + Math.abs(t.rMultiple);
                        });
                    }
                });

                let targetR = 12; 
                if (timeFilter === 'week') targetR = 3; 
                if (timeFilter === 'year') targetR = 144; 
                if (timeFilter === 'all') targetR = 144; 
                
                const progressPct = Math.min(Math.max((totalR / targetR) * 100, 0), 100);

                return { 
                    totalTrades, winRate, winRateNum, avgWin, avgLoss, totalR: totalR.toFixed(2), totalPnL: totalPnL.toFixed(2), 
                    targetR, progressPct, expectancy, maxDD, mistakeCost, dayStats, sessionStats
                };
            }, [filteredTrades, timeFilter]);

            const calcResults = useMemo(() => {
                const riskAmount = (parseFloat(calc.account) * parseFloat(calc.riskPct)) / 100;
                const slDist = Math.abs(parseFloat(calc.entry) - parseFloat(calc.sl));
                return { 
                    riskAmount: isNaN(riskAmount) ? 0 : riskAmount.toFixed(2), 
                    positionSize: slDist > 0 && !isNaN(riskAmount) ? (riskAmount / slDist).toFixed(4) : 0 
                };
            }, [calc]);

            const checkedCount = Object.values(checklist).filter(Boolean).length;

            // == 處理函數區 ==
            const runMonteCarlo = () => {
                if(dashboardStats.totalTrades < 5) return alert("需要最少 5 筆交易數據來進行預測。");
                if(dashboardStats.avgWin === 0 && dashboardStats.avgLoss === 0) return;
                
                let passCount = 0; let bustCount = 0; const iterations = 1000;
                for(let i=0; i<iterations; i++) {
                    let simR = 0; let isBusted = false; let isPassed = false;
                    for(let t=0; t<40; t++) { 
                        if(Math.random() < dashboardStats.winRateNum) simR += dashboardStats.avgWin;
                        else simR -= dashboardStats.avgLoss;
                        
                        if(simR <= -5) { isBusted = true; break; }
                        if(simR >= 12) { isPassed = true; break; }
                    }
                    if(isBusted) bustCount++;
                    else if(isPassed || simR >= 12) passCount++;
                }
                setMcResult({ passRate: ((passCount/iterations)*100).toFixed(1), bustRate: ((bustCount/iterations)*100).toFixed(1) });
            };

            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleCalcChange = (e) => setCalc(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const applyCalcRisk = () => setFormData(prev => ({ ...prev, riskAmount: calcResults.riskAmount }));
            
            const handleScreenshotChange = (index, value) => {
                const newUrls = [...formData.screenshotUrls]; 
                newUrls[index] = value;
                setFormData(prev => ({ ...prev, screenshotUrls: newUrls }));
            };
            const addScreenshotField = () => setFormData(prev => ({ ...prev, screenshotUrls: [...prev.screenshotUrls, ''] }));
            const removeScreenshotField = (index) => setFormData(prev => ({ ...prev, screenshotUrls: prev.screenshotUrls.filter((_, i) => i !== index) }));
            const toggleTag = (tagId) => setFormData(prev => ({ ...prev, tags: prev.tags.includes(tagId) ? prev.tags.filter(t => t !== tagId) : [...prev.tags, tagId] }));

            const addNewTag = (e) => {
                e.preventDefault(); 
                if (!newTagInput.trim()) return;
                setAvailableTags([...availableTags, { id: 'tag_'+Date.now(), label: newTagInput.trim(), color: TAG_COLORS[Math.floor(Math.random() * TAG_COLORS.length)] }]);
                setNewTagInput('');
            };
            const deleteTag = (tagId) => {
                if(confirm("Delete tag?")) {
                    setAvailableTags(availableTags.filter(t => t.id !== tagId));
                    setFormData(prev => ({...prev, tags: prev.tags.filter(t => t !== tagId)}));
                }
            };

            const startEditMode = (trade) => {
                setEditingTradeId(trade.id);
                setFormData({ ...trade, screenshotUrls: trade.screenshotUrls?.length ? trade.screenshotUrls : [''] });
                setChecklist(trade.checklistState || { liquidity: false, killzone: false, displacement: false, htf: false });
                setTimeout(() => formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            };
            const cancelEditMode = () => {
                setEditingTradeId(null); 
                setFormData({ date: getLocalYMD(0), asset: 'NQ', timeframe: '5m', direction: 'Long', setup: 'FVG', killzone: 'NY AM', riskAmount: '', pnl: '', screenshotUrls: [''], notes: '', tags: [] });
                setChecklist({ liquidity: false, killzone: false, displacement: false, htf: false });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const risk = parseFloat(formData.riskAmount);
                const profit = parseFloat(formData.pnl);
                if (isNaN(risk) || isNaN(profit) || risk <= 0) return alert("Invalid numbers");

                const validUrls = formData.screenshotUrls.filter(url => url.trim() !== '');
                const tradeData = { ...formData, riskAmount: risk, pnl: profit, screenshotUrls: validUrls, rMultiple: parseFloat((profit / risk).toFixed(2)), checklistScore: checkedCount, checklistState: checklist };

                if (editingTradeId) setTrades(trades.map(t => t.id === editingTradeId ? { ...t, ...tradeData } : t));
                else setTrades([...trades, { ...tradeData, id: Date.now() }]);
                
                cancelEditMode();
            };

            const exportJSON = () => {
                const a = document.createElement('a'); 
                a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ trades, availableTags }));
                a.download = `ict_backup_${getLocalYMD()}.json`; 
                a.click();
            };
            
            const exportCSV = () => {
                const headers = ['Date', 'Asset', 'Timeframe', 'Direction', 'Session', 'Setup', 'Grade', 'Risk($)', 'PnL($)', 'R-Multiple', 'Tags', 'Screenshots', 'Notes'];
                const rows = trades.map(t => [
                    t.date, t.asset, t.timeframe, t.direction, t.killzone, t.setup, t.checklistScore >= 3 ? 'A' : (t.checklistScore > 0 ? 'B' : '-'),
                    t.riskAmount, t.pnl, t.rMultiple, 
                    `"${(t.tags || []).map(id => (availableTags.find(x => x.id === id)?.label || id).split(' ')[0]).join('; ')}"`, 
                    `"${(t.screenshotUrls || []).join('; ')}"`, 
                    t.notes ? `"${t.notes.replace(/"/g, '""')}"` : ''
                ].join(','));
                const blob = new Blob(["\uFEFF" + [headers.join(','), ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob); 
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `ict_report_${getLocalYMD()}.csv`; 
                a.click(); 
                URL.revokeObjectURL(url);
            };
            
            const importData = (e) => {
                const file = e.target.files[0]; 
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try { 
                        const data = JSON.parse(ev.target.result); 
                        const migrate = (arr) => arr.map(t => ({ ...t, screenshotUrls: t.screenshotUrls || (t.screenshotUrl ? [t.screenshotUrl] : []) }));
                        if (Array.isArray(data)) { 
                            setTrades(migrate(data)); 
                            alert("✅ Old format imported"); 
                        } else if (data.trades) { 
                            setTrades(migrate(data.trades)); 
                            if(data.availableTags) setAvailableTags(data.availableTags); 
                            alert("✅ Backup restored"); 
                        }
                    } catch { alert("❌ Invalid JSON"); } 
                    e.target.value = null;
                }; 
                reader.readAsText(file);
            };

            const openLightbox = (urls, index = 0) => setLightbox({ isOpen: true, urls, currentIndex: index });
            const closeLightbox = () => setLightbox({ isOpen: false, urls: [], currentIndex: 0 });
            const nextImage = (e) => { e.stopPropagation(); setLightbox(prev => ({...prev, currentIndex: (prev.currentIndex + 1) % prev.urls.length})); };
            const prevImage = (e) => { e.stopPropagation(); setLightbox(prev => ({...prev, currentIndex: (prev.currentIndex - 1 + prev.urls.length) % prev.urls.length})); };

            return (
                <div className="min-h-screen p-2 sm:p-4 lg:p-6 pb-24">
                    <div className="max-w-[1400px] mx-auto space-y-4 lg:space-y-6">
                        
                        {/* Header & Heatmap */}
                        <header className="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-4 pb-4 border-b border-slate-800">
                            <div className="w-full lg:w-auto">
                                <h1 className="text-2xl lg:text-3xl font-black tracking-tight text-white flex items-center">
                                    <span className="text-blue-500 mr-3">⌖</span> ICT Sniper HUD <span className="text-xs bg-blue-600/20 text-blue-400 px-2 py-0.5 rounded ml-3 border border-blue-500/30">ULTIMATE</span>
                               </h1>
                                <div className="flex flex-col sm:flex-row justify-between sm:items-center mt-2 gap-2">
                                    <p className="text-slate-400 text-xs font-mono">Mission: +12R. Data-driven execution.</p>
                                    <TradingHeatmap trades={trades} />
                                </div>
                            </div>
                            
                            <div className="flex bg-slate-800/80 p-1 rounded-full border border-slate-700 w-full sm:w-auto overflow-x-auto hide-scrollbar">
                                {['week', 'month', 'year', 'all'].map(tf => (
                                    <button key={tf} onClick={() => setTimeFilter(tf)} className={`flex-1 sm:flex-none px-4 py-1.5 rounded-full text-xs font-bold capitalize transition-all duration-300 ${timeFilter === tf ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
                                        {tf === 'week' ? '本週' : tf === 'month' ? '本月' : tf === 'year' ? '今年' : '全部'}
                                    </button>
                                ))}
                            </div>
                        </header>

                        {/* Top KPIs & Monte Carlo */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-6">
                            <div className="col-span-1 lg:col-span-3 bg-slate-800/50 backdrop-blur rounded-2xl p-4 lg:p-6 border border-slate-700/50 flex flex-col items-center justify-center relative shadow-xl">
                                <div className="absolute top-3 left-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Target ({timeFilter})</div>
                                <ProgressRing radius={60} stroke={8} progress={dashboardStats.progressPct} target={dashboardStats.targetR} current={dashboardStats.totalR} />
                            </div>

                            <div className="col-span-1 lg:col-span-6 bg-slate-800/50 backdrop-blur rounded-2xl p-3 lg:p-4 border border-slate-700/50 shadow-xl overflow-hidden relative">
                                <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 absolute top-3 left-4 z-10">Equity Curve</div>
                                <div className="h-32 lg:h-full pt-4 lg:pt-0"><EquityChart trades={filteredTrades} /></div>
                            </div>

                            <div className="col-span-1 lg:col-span-3 grid grid-cols-2 lg:grid-cols-1 gap-3">
                                <div className="bg-slate-800/50 backdrop-blur rounded-xl p-3 border border-slate-700/50 shadow-xl flex justify-between items-center">
                                    <div>
                                        <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">系統期望值 (EV)</div>
                                        <div className={`text-xl font-black ${dashboardStats.expectancy > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                            {dashboardStats.expectancy > 0 ? '+' : ''}{dashboardStats.expectancy.toFixed(2)}<span className="text-[10px] text-slate-500 ml-1">R/Trd</span>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">勝率 (Win)</div>
                                        <div className="text-xl font-black text-white">{dashboardStats.winRate}<span className="text-[10px] text-slate-500">%</span></div>
                                    </div>
                                </div>
                                <div className="bg-slate-800/50 backdrop-blur rounded-xl p-3 border border-slate-700/50 shadow-xl relative overflow-hidden flex flex-col justify-between group">
                                    <div className="flex justify-between items-start z-10">
                                        <div>
                                            <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1">Prop Firm 預測機率</div>
                                            {mcResult ? (
                                                <div className="text-xs">
                                                    <span className="text-emerald-400 font-bold mr-2">通關: {mcResult.passRate}%</span>
                                                    <span className="text-red-400 font-bold">爆倉: {mcResult.bustRate}%</span>
                                                </div>
                                            ) : <div className="text-[10px] text-slate-400 italic mt-1">基於蒙地卡羅演算法</div>}
                                        </div>
                                        <button onClick={runMonteCarlo} className="bg-blue-600 hover:bg-blue-500 text-white text-[9px] px-2 py-1 rounded font-bold transition z-20">🔮 RUN</button>
                                    </div>
                                    <div className="flex justify-between items-end mt-2 pt-2 border-t border-slate-700/50 z-10">
                                        <span className="text-[9px] text-slate-500">Max Drawdown:</span>
                                        <span className={`text-xs font-bold ${dashboardStats.maxDD >= 5 ? 'text-red-500 animate-pulse' : 'text-orange-400'}`}>-{dashboardStats.maxDD.toFixed(2)} R</span>
                                    </div>
                                    {dashboardStats.maxDD >= 5 && <div className="absolute inset-0 bg-red-500/10 z-0"></div>}
                                </div>
                            </div>
                        </div>

                        {/* Day & Time Edge Analysis */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-6">
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/50 shadow-lg">
                                <h3 className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-3">📅 星期效益分佈 (Day Edge)</h3>
                                <div className="flex items-end justify-between h-20 gap-1 sm:gap-2">
                                    {['Mon','Tue','Wed','Thu','Fri'].map((day, idx) => {
                                        const stat = dashboardStats.dayStats[idx+1]; 
                                        const height = stat.count === 0 ? 0 : Math.min(Math.max((Math.abs(stat.r) / 5) * 100, 10), 100);
                                        const isPos = stat.r >= 0;
                                        return (
                                            <div key={day} className="flex flex-col items-center flex-1 group">
                                                <div className="text-[8px] text-slate-400 mb-1 opacity-0 group-hover:opacity-100 transition-opacity">{stat.r > 0 ? '+' : ''}{stat.r.toFixed(1)}</div>
                                                <div className={`w-full max-w-[30px] rounded-t-sm transition-all duration-500 ${isPos ? 'bg-emerald-500/50 group-hover:bg-emerald-500' : 'bg-red-500/50 group-hover:bg-red-500'}`} style={{height: `${height}%`, minHeight: stat.count ? '4px' : '2px'}}></div>
                                                <div className="text-[9px] text-slate-500 mt-1 uppercase font-bold">{day}</div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                            <div className="bg-slate-800/40 rounded-xl p-4 border border-slate-700/50 shadow-lg flex flex-col justify-between">
                                <h3 className="text-[10px] font-bold text-orange-400 uppercase tracking-widest mb-3 flex justify-between">
                                    <span>⚠️ 心理失誤成本 (Mistakes)</span>
                                </h3>
                                {Object.keys(dashboardStats.mistakeCost).length === 0 ? (
                                    <div className="flex-1 flex items-center justify-center text-xs text-slate-600 font-mono italic">Flawless execution. No mistakes logged.</div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-2 overflow-y-auto max-h-24 hide-scrollbar">
                                        {Object.entries(dashboardStats.mistakeCost).sort((a,b)=>b[1]-a[1]).map(([tagId, cost]) => {
                                            const tagDef = availableTags.find(t => t.id === tagId) || { label: tagId, color: 'text-slate-400' };
                                            return (
                                                <div key={tagId} className="flex justify-between items-center bg-slate-900/50 px-2 py-1 rounded border border-slate-700/30">
                                                    <span className={`text-[9px] px-1.5 py-0.5 rounded border ${tagDef.color}`}>{tagDef.label.split(' ')[0]}</span>
                                                    <span className="font-mono text-xs text-red-400 font-bold">-{cost.toFixed(1)} R</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Main App Grid */}
                        <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 lg:gap-6">
                            
                            {/* Left: Form */}
                            <div className="xl:col-span-4 space-y-4 lg:space-y-6 order-2 xl:order-1">
                                <div className="bg-slate-800/80 p-4 lg:p-5 rounded-2xl border border-slate-700 shadow-xl">
                                    <h2 className="text-[10px] font-bold mb-3 text-slate-400 uppercase tracking-widest"><span className="text-blue-500 mr-2">🧮</span> Calculator</h2>
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        <div><label className="block text-[9px] text-slate-500 mb-0.5">Account ($)</label><input type="number" name="account" value={calc.account} onChange={handleCalcChange} className="w-full p-1.5 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" /></div>
                                        <div><label className="block text-[9px] text-slate-500 mb-0.5">Risk (%)</label><input type="number" step="0.1" name="riskPct" value={calc.riskPct} onChange={handleCalcChange} className="w-full p-1.5 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" /></div>
                                        <div><label className="block text-[9px] text-slate-500 mb-0.5">Entry</label><input type="number" step="any" name="entry" value={calc.entry} onChange={handleCalcChange} className="w-full p-1.5 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" /></div>
                                        <div><label className="block text-[9px] text-slate-500 mb-0.5">Stop Loss</label><input type="number" step="any" name="sl" value={calc.sl} onChange={handleCalcChange} className="w-full p-1.5 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" /></div>
                                    </div>
                                    <button onClick={applyCalcRisk} className="w-full border border-blue-500/30 bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 text-[10px] font-bold py-1.5 rounded transition">Apply Risk ↓</button>
                                </div>

                                <div className="bg-slate-800/80 p-4 lg:p-5 rounded-2xl border border-slate-700 shadow-xl">
                                    <div ref={formRef}></div>
                                    <h2 className="text-[10px] font-bold mb-4 text-slate-400 uppercase tracking-widest flex justify-between items-center">
                                        <span><span className={`${editingTradeId ? 'text-blue-500' : 'text-emerald-500'} mr-2`}>{editingTradeId ? '✏️' : '➕'}</span> {editingTradeId ? '編輯記錄 / Edit' : 'New Entry'}</span>
                                        {editingTradeId && <button onClick={cancelEditMode} className="text-slate-500 hover:text-white bg-slate-700 px-2 py-0.5 rounded text-[9px]">取消</button>}
                                    </h2>
                                    
                                    <form onSubmit={handleSubmit} className="space-y-3 lg:space-y-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div><label className="block text-[9px] text-slate-500 mb-1">Date</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" required /></div>
                                            <div><label className="block text-[9px] text-slate-500 mb-1">Asset</label><input type="text" name="asset" value={formData.asset} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500 uppercase" required /></div>
                                            <div><label className="block text-[9px] text-slate-500 mb-1">Timeframe</label><select name="timeframe" value={formData.timeframe} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500"><option>1m</option><option>3m</option><option>5m</option><option>15m</option><option>1H</option></select></div>
                                            <div><label className="block text-[9px] text-slate-500 mb-1">Direction</label><select name="direction" value={formData.direction} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500"><option value="Long">Long ↗</option><option value="Short">Short ↘</option></select></div>
                                            
                                            {/* 已修復：補回時間表的互動 UI */}
                                            <div>
                                                <div className="flex justify-between items-center mb-1">
                                                    <label className="block text-[9px] text-slate-500">Session</label>
                                                    <button type="button" onClick={()=>setShowKillzoneInfo(!showKillzoneInfo)} className="text-[9px] text-blue-400 hover:text-blue-300">🕒 時間表</button>
                                                </div>
                                                <select name="killzone" value={formData.killzone} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500">
                                                    <option>Asia</option><option>London</option><option>NY AM</option><option>NY PM</option>
                                                </select>
                                            </div>
                                            <div><label className="block text-[9px] text-slate-500 mb-1">Setup</label><select name="setup" value={formData.setup} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500"><option>FVG</option><option>Order Block</option><option>Breaker</option><option>Silver Bullet</option></select></div>
                                        </div>

                                        {/* 時間表下拉選單 */}
                                        {showKillzoneInfo && (
                                            <div className="bg-slate-900/80 p-2.5 rounded-lg border border-slate-700/50 text-[9px] text-slate-400 font-mono space-y-1 my-2 transition-all">
                                                <div className="font-bold text-blue-400 mb-1 border-b border-slate-700 pb-1 flex justify-between">
                                                    <span>ICT Killzone (夏令 DST)</span>
                                                    <span>NY: UTC-4 | HK: UTC+8</span>
                                                </div>
                                                <div className="grid grid-cols-3 font-bold text-slate-500 mb-1">
                                                    <span>Session</span><span>NY (紐約)</span><span>HKT (香港)</span>
                                                </div>
                                                <div className="grid grid-cols-3 hover:text-slate-200 transition-colors"><span>Asia</span><span>20:00 - 00:00</span><span>08:00 - 12:00</span></div>
                                                <div className="grid grid-cols-3 hover:text-slate-200 transition-colors"><span>London</span><span>02:00 - 05:00</span><span>14:00 - 17:00</span></div>
                                                <div className="grid grid-cols-3 hover:text-slate-200 transition-colors"><span>NY AM</span><span>08:30 - 11:00</span><span>20:30 - 23:00</span></div>
                                                <div className="grid grid-cols-3 hover:text-slate-200 transition-colors"><span>NY PM</span><span>13:30 - 16:00</span><span>01:30 - 04:00</span></div>
                                                <div className="text-orange-500 mt-1.5 pt-1 border-t border-slate-700">* 冬令時間 (11月-3月) HKT 需加 1 小時</div>
                                            </div>
                                        )}

                                        <div className="bg-slate-900/50 p-2.5 rounded-lg border border-slate-700/50">
                                            <div className="flex justify-between mb-2"><label className="text-[9px] font-bold text-slate-500 uppercase">A+ Confluence</label><span className={`text-[9px] font-bold ${checkedCount >= 3 ? 'text-emerald-500' : 'text-orange-500'}`}>{checkedCount}/4</span></div>
                                            <div className="grid grid-cols-2 gap-1.5 text-[10px] text-slate-300">
                                                <label className="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" onChange={(e)=>setChecklist({...checklist, liquidity: e.target.checked})} checked={checklist.liquidity} className="accent-blue-500 w-3 h-3"/><span>Liq Sweep</span></label>
                                                <label className="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" onChange={(e)=>setChecklist({...checklist, killzone: e.target.checked})} checked={checklist.killzone} className="accent-blue-500 w-3 h-3"/><span>In Killzone</span></label>
                                                <label className="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" onChange={(e)=>setChecklist({...checklist, displacement: e.target.checked})} checked={checklist.displacement} className="accent-blue-500 w-3 h-3"/><span>Displacement</span></label>
                                                <label className="flex items-center space-x-1.5 cursor-pointer"><input type="checkbox" onChange={(e)=>setChecklist({...checklist, htf: e.target.checked})} checked={checklist.htf} className="accent-blue-500 w-3 h-3"/><span>HTF Align</span></label>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 border-t border-slate-700/50 pt-3">
                                            <div>
                                                <label className="block text-[9px] font-bold text-slate-400 mb-1">總風險 / Total Risk ($)</label>
                                                <input type="number" step="0.01" name="riskAmount" value={formData.riskAmount} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-xs font-mono text-white outline-none" required />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] font-bold text-slate-400 mb-1">總盈虧 / Total PnL ($)</label>
                                                <input type="number" step="0.01" name="pnl" value={formData.pnl} onChange={handleInputChange} className="w-full p-2 bg-slate-900 border border-slate-600 rounded text-xs font-mono text-white outline-none" required />
                                            </div>
                                        </div>

                                        <div className="border-t border-slate-700/50 pt-2">
                                            <div className="flex justify-between items-center mb-1.5">
                                                <label className="block text-[9px] font-bold text-slate-400">🏷️ Tags</label>
                                                <button type="button" onClick={() => setIsManagingTags(!isManagingTags)} className={`text-[9px] px-2 py-0.5 rounded ${isManagingTags ? 'bg-blue-600 text-white' : 'text-blue-400 bg-slate-800'}`}>{isManagingTags ? '完成' : '管理'}</button>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5">
                                                {availableTags.map(tag => {
                                                    const isSelected = formData.tags.includes(tag.id);
                                                    return (
                                                        <div key={tag.id} className="relative flex items-center group">
                                                            <button type="button" onClick={() => !isManagingTags && toggleTag(tag.id)} className={`text-[9px] px-2 py-0.5 rounded-full border transition-all ${isSelected && !isManagingTags ? tag.color : 'bg-slate-900 text-slate-500 border-slate-700'} ${isManagingTags ? 'pr-5 opacity-50' : 'hover:border-slate-500'}`}>{tag.label.split(' ')[0]}</button>
                                                            {isManagingTags && <button type="button" onClick={() => deleteTag(tag.id)} className="absolute right-0 text-red-400 hover:text-white bg-slate-800 rounded-full w-3.5 h-3.5 flex items-center justify-center text-[8px] font-bold">×</button>}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            {isManagingTags && (
                                                <div className="mt-2 flex gap-1 animate-pulse" style={{animationIterationCount: 1}}>
                                                    <input type="text" value={newTagInput} onChange={(e) => setNewTagInput(e.target.value)} placeholder="New Tag" className="flex-1 p-1 bg-slate-900 border border-slate-600 rounded text-[10px] text-white outline-none" onKeyPress={(e) => e.key === 'Enter' && addNewTag(e)} />
                                                    <button type="button" onClick={addNewTag} className="bg-blue-600 text-white text-[10px] px-2 rounded font-bold">➕</button>
                                                </div>
                                            )}
                                        </div>

                                        <div className="space-y-1.5">
                                            <label className="block text-[9px] font-bold text-slate-400">🖼️ Screenshots</label>
                                            {formData.screenshotUrls.map((url, index) => (
                                                <div key={index} className="flex gap-1.5">
                                                    <input type="url" value={url} onChange={(e) => handleScreenshotChange(index, e.target.value)} className="flex-1 p-1.5 bg-slate-900 border border-slate-700 rounded text-[10px] text-blue-400 outline-none" placeholder="URL" />
                                                    {index === formData.screenshotUrls.length - 1 ? <button type="button" onClick={addScreenshotField} className="bg-slate-700 text-slate-300 px-2 rounded text-xs">+</button> : <button type="button" onClick={() => removeScreenshotField(index)} className="bg-slate-800 text-slate-500 px-2 rounded text-xs">×</button>}
                                                </div>
                                            ))}
                                        </div>
                                        <div><textarea name="notes" value={formData.notes} onChange={handleInputChange} rows="2" className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white outline-none focus:border-blue-500" placeholder="Notes (例如平倉策略)..."></textarea></div>
                                        
                                        <button type="submit" className={`w-full ${editingTradeId ? 'bg-blue-600' : 'bg-emerald-600'} text-white font-black py-2.5 rounded shadow-lg transition-all`}>{editingTradeId ? 'UPDATE LOG' : 'EXECUTE'}</button>
                                    </form>
                                </div>
                            </div>

                            {/* Right: Ledger */}
                            <div className="xl:col-span-8 bg-slate-800/80 rounded-2xl border border-slate-700 shadow-xl overflow-hidden flex flex-col order-1 xl:order-2 h-full min-h-[500px]">
                                <div className="p-3 lg:p-4 border-b border-slate-700/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                    <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center w-full sm:w-auto">
                                        <span className="text-purple-500 mr-2">📋</span> Ledger
                                        <span className="ml-auto sm:hidden text-[9px] bg-slate-700 px-2 py-0.5 rounded text-white">{filteredTrades.length} Trds</span>
                                    </h2>
                                    
                                    <div className="flex flex-wrap gap-2 w-full sm:w-auto">
                                        <select value={advFilter.type} onChange={e => setAdvFilter({...advFilter, type: e.target.value})} className="bg-slate-900 border border-slate-600 text-slate-300 text-[9px] rounded py-1 px-2 outline-none flex-1 sm:flex-none">
                                            <option value="All">All Types</option><option value="Wins">Wins Only</option><option value="Losses">Losses Only</option>
                                        </select>
                                        <select value={advFilter.setup} onChange={e => setAdvFilter({...advFilter, setup: e.target.value})} className="bg-slate-900 border border-slate-600 text-slate-300 text-[9px] rounded py-1 px-2 outline-none flex-1 sm:flex-none">
                                            <option value="All">All Setups</option><option value="FVG">FVG</option><option value="Order Block">Order Block</option><option value="Breaker">Breaker</option><option value="Silver Bullet">Silver Bullet</option>
                                        </select>
                                        <div className="hidden sm:flex space-x-1">
                                            <button onClick={() => fileInputRef.current.click()} className="bg-slate-700 hover:bg-slate-600 text-white text-[9px] px-2 py-1 rounded transition" title="Import">📤</button>
                                            <button onClick={exportJSON} className="bg-blue-600 hover:bg-blue-500 text-white text-[9px] px-2 py-1 rounded transition" title="Export JSON">📥</button>
                                            <button onClick={exportCSV} className="bg-emerald-600 hover:bg-emerald-500 text-white text-[9px] px-2 py-1 rounded transition" title="Export CSV">📊</button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto bg-slate-900/20 p-2 sm:p-0">
                                    {filteredTrades.length === 0 ? (
                                        <div className="py-12 text-center text-slate-600 italic font-mono text-xs">No records found. Adjust filters.</div>
                                    ) : (
                                        <>
                                            <table className="hidden md:table w-full text-sm text-left whitespace-nowrap">
                                                <thead className="text-[10px] text-slate-500 uppercase bg-slate-900/80 border-b border-slate-700 sticky top-0 z-10">
                                                    <tr><th className="px-4 py-3 font-bold">Asset</th><th className="px-4 py-3 font-bold">Setup</th><th className="px-4 py-3 text-center font-bold">Grade</th><th className="px-4 py-3 text-right font-bold">PnL</th><th className="px-4 py-3 text-center font-bold text-blue-400">R-Value</th><th className="px-4 py-3 text-center">Action</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-700/50">
                                                    {[...filteredTrades].reverse().map(trade => (
                                                        <React.Fragment key={trade.id}>
                                                            <tr className="hover:bg-slate-700/30 transition-colors group">
                                                                <td className="px-4 py-3">
                                                                    <div className="font-bold text-white text-xs">{trade.asset} <span className="text-[9px] font-normal text-slate-500 bg-slate-900 px-1 rounded ml-1">{trade.timeframe}</span></div>
                                                                    <div className="text-[9px] text-slate-500 mt-0.5 font-mono">{trade.date}</div>
                                                                </td>
                                                                <td className="px-4 py-3">
                                                                    <div className="flex items-center space-x-1.5">
                                                                        <span className={`px-1 py-0.5 rounded text-[8px] font-bold uppercase ${trade.direction === 'Long' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{trade.direction}</span>
                                                                        <span className="font-medium text-slate-300 text-xs">{trade.setup}</span>
                                                                    </div>
                                                                    {trade.tags && trade.tags.length > 0 && (
                                                                        <div className="flex gap-1 mt-1">{trade.tags.map(id => <span key={id} className={`text-[7px] px-1 py-0.5 rounded border ${(availableTags.find(t=>t.id===id)||{color:'bg-slate-700 text-slate-400 border-slate-600'}).color} opacity-80`}>{(availableTags.find(t=>t.id===id)||{label:id}).label.split(' ')[0]}</span>)}</div>
                                                                    )}
                                                                </td>
                                                                <td className="px-4 py-3 text-center">{trade.checklistScore >= 3 ? <span className="w-5 h-5 inline-flex items-center justify-center rounded-full bg-emerald-500/20 text-emerald-400 font-bold text-[10px] border border-emerald-500/30">A</span> : trade.checklistScore > 0 ? <span className="w-5 h-5 inline-flex items-center justify-center rounded-full bg-orange-500/20 text-orange-400 font-bold text-[10px] border border-orange-500/30">B</span> : <span className="text-slate-600">-</span>}</td>
                                                                <td className={`px-4 py-3 text-right font-mono font-bold text-xs ${trade.pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{trade.pnl > 0 ? '+' : ''}{trade.pnl}</td>
                                                                <td className="px-4 py-3 text-center"><span className={`inline-flex items-center justify-center px-2 py-0.5 rounded text-[10px] font-black font-mono ${trade.rMultiple >= 2 ? 'bg-emerald-500 text-slate-900 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : trade.rMultiple > 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{trade.rMultiple > 0 ? '+' : ''}{trade.rMultiple}R</span></td>
                                                                <td className="px-4 py-3 text-center">
                                                                    {/* 修復：改為 opacity-70 永遠可見，並補回缺失的 ✖ 按鈕 */}
                                                                    <div className="flex items-center justify-center space-x-2 opacity-70 group-hover:opacity-100 transition-opacity">
                                                                        {trade.screenshotUrls && trade.screenshotUrls.length > 0 ? (
                                                                            <button type="button" onClick={() => openLightbox(trade.screenshotUrls)} className="text-blue-400 hover:text-blue-300 relative group/link text-sm">🖼️<span className="absolute -top-1 -right-1 text-[7px] bg-slate-700 text-white w-3 h-3 flex items-center justify-center rounded-full">{trade.screenshotUrls.length}</span></button>
                                                                        ) : <span className="text-slate-700 text-sm">🖼️</span>}
                                                                        <button onClick={() => startEditMode(trade)} className="text-slate-400 hover:text-blue-400 text-xs">✏️</button>
                                                                        <button onClick={() => {if(confirm("Delete?")) setTrades(trades.filter(t => t.id !== trade.id))}} className="text-slate-500 hover:text-red-400 text-xs">✖</button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                            {trade.notes && <tr className="bg-slate-800/30 border-b border-slate-700/30"><td colSpan="6" className="px-4 py-2 text-[10px] text-slate-400 whitespace-normal"><span className="font-bold text-slate-500 mr-1 uppercase">📝</span>{trade.notes}</td></tr>}
                                                        </React.Fragment>
                                                    ))}
                                                </tbody>
                                            </table>

                                            <div className="md:hidden flex flex-col gap-3 pb-4">
                                                {[...filteredTrades].reverse().map(trade => (
                                                    <div key={trade.id} className="bg-slate-800 rounded-lg p-3 border border-slate-700 shadow-sm relative overflow-hidden">
                                                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${trade.rMultiple > 0 ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                                        <div className="flex justify-between items-start mb-2 pl-2">
                                                            <div>
                                                                <div className="font-bold text-white text-sm">{trade.asset} <span className="text-[9px] text-slate-400 font-normal ml-1 bg-slate-900 px-1 rounded">{trade.timeframe}</span></div>
                                                                <div className="text-[9px] text-slate-500 font-mono mt-0.5">{trade.date} | {trade.killzone}</div>
                                                            </div>
                                                            <div className={`text-lg font-black font-mono ${trade.rMultiple >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{trade.rMultiple > 0 ? '+' : ''}{trade.rMultiple}R</div>
                                                        </div>
                                                        <div className="flex items-center gap-2 pl-2 mb-2">
                                                            <span className={`px-1.5 py-0.5 rounded text-[8px] font-bold uppercase ${trade.direction === 'Long' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{trade.direction}</span>
                                                            <span className="text-xs text-slate-300">{trade.setup}</span>
                                                            <span className="text-xs text-slate-500 font-mono ml-auto">${trade.pnl > 0 ? '+' : ''}{trade.pnl}</span>
                                                        </div>
                                                        {trade.tags && trade.tags.length > 0 && <div className="flex flex-wrap gap-1 pl-2 mb-2">{trade.tags.map(id => <span key={id} className={`text-[8px] px-1 py-0.5 rounded border ${(availableTags.find(t=>t.id===id)||{color:'bg-slate-700 text-slate-400 border-slate-600'}).color} opacity-80`}>{(availableTags.find(t=>t.id===id)||{label:id}).label.split(' ')[0]}</span>)}</div>}
                                                        {trade.notes && <div className="pl-2 text-[10px] text-slate-400 bg-slate-900/50 p-1.5 rounded line-clamp-2 mb-2">{trade.notes}</div>}
                                                        <div className="flex justify-between items-center pl-2 pt-2 border-t border-slate-700/50">
                                                            <div className="flex gap-3">
                                                                {trade.screenshotUrls && trade.screenshotUrls.length > 0 ? (
                                                                    <button onClick={() => openLightbox(trade.screenshotUrls)} className="text-blue-400 text-xs flex items-center gap-1">🖼️ <span className="text-[9px] bg-slate-700 text-white px-1 rounded">{trade.screenshotUrls.length}</span></button>
                                                                ) : <span className="text-slate-600 text-xs">🖼️</span>}
                                                            </div>
                                                            <div className="flex gap-3">
                                                                <button onClick={() => startEditMode(trade)} className="text-slate-400 hover:text-blue-400 text-xs">✏️</button>
                                                                <button onClick={() => {if(confirm("Delete?")) setTrades(trades.filter(t => t.id !== trade.id))}} className="text-slate-500 hover:text-red-400 text-xs">✖</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {lightbox.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 lightbox-anim" onClick={closeLightbox}>
                            <div className="absolute top-4 right-4 flex gap-4 text-white z-[60]">
                                <span className="text-sm font-mono bg-black/50 px-2 py-1 rounded">{lightbox.currentIndex + 1} / {lightbox.urls.length}</span>
                                <button onClick={closeLightbox} className="text-2xl hover:text-red-400 transition">&times;</button>
                            </div>
                            {lightbox.urls.length > 1 && <button onClick={prevImage} className="absolute left-2 sm:left-6 text-white text-4xl hover:text-blue-400 bg-black/50 w-12 h-12 rounded-full flex items-center justify-center z-[60]">&#8249;</button>}
                            <div className="relative w-full h-full max-w-6xl max-h-screen p-4 flex justify-center items-center" onClick={e => e.stopPropagation()}>
                                <img src={lightbox.urls[lightbox.currentIndex]} alt="Trading Setup" className="max-w-full max-h-[90vh] object-contain rounded shadow-2xl border border-slate-700" onError={(e) => { e.target.onerror = null; e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" fill="%23334155"><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="20">Image Error</text></svg>'; }} />
                            </div>
                            {lightbox.urls.length > 1 && <button onClick={nextImage} className="absolute right-2 sm:right-6 text-white text-4xl hover:text-blue-400 bg-black/50 w-12 h-12 rounded-full flex items-center justify-center z-[60]">&#8250;</button>}
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
